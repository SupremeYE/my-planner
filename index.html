<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#515f74" />
    <meta name="description" content="나만의 생산성 플래너 - 일간, 주간, 월간 계획 관리" />
    <title>My Planner</title>
    <!-- 탭 아이콘 (가벼운 SVG). 정확한 파도 일러스트 PNG를 쓰려면 아래 PNG 한 줄만 추가하고 favicon-32.png를 넣으면 됨 -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- iOS 홈 화면 추가 시. 캐릭터 아이콘으로 바꿀 때는 apple-touch-icon.png(180~512 권장) 교체 -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
